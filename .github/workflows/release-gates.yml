name: Release gates

on:
  workflow_call:
  workflow_dispatch:

jobs:
  supply-chain:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - name: Audit locked production dependencies
        run: |
          uv export --all-packages --locked --no-dev --no-emit-workspace --output-file requirements-audit.txt
          # hermes-agent 0.18.2 pins these exact vulnerable versions. Keep the
          # exceptions narrow and remove them as soon as upstream publishes a
          # compatible release with cryptography>=48.0.1 and Pillow>=12.3.0.
          uv tool run pip-audit --requirement requirements-audit.txt --no-deps --disable-pip \
            --ignore-vuln GHSA-537c-gmf6-5ccf \
            --ignore-vuln PYSEC-2026-2253 \
            --ignore-vuln PYSEC-2026-2254 \
            --ignore-vuln PYSEC-2026-2255 \
            --ignore-vuln PYSEC-2026-2256 \
            --ignore-vuln PYSEC-2026-2257
      - name: Scan repository history for secrets
        uses: gitleaks/gitleaks-action@v2

  cpu-session-audit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2022, macos-15-intel, macos-15-arm64]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --all-packages --locked
      - name: Configure isolated Hermes profile
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/hermes-profile"
          printf 'plugins:\n  enabled: [onnx-asr]\nstt:\n  provider: onnx_asr\n  onnx_asr:\n    model: gigaam-v3-e2e-rnnt\n    quantization: int8\n    model_dir: "%s/models/onnx-asr"\n' "$RUNNER_TEMP/hermes-profile" > "$RUNNER_TEMP/hermes-profile/config.yaml"
          echo "HERMES_HOME=$RUNNER_TEMP/hermes-profile" >> "$GITHUB_ENV"
      - run: uv run --package hermes-onnx-asr hermes onnx-asr fetch gigaam-v3-e2e-rnnt --quantization int8
      - run: uv run --package hermes-onnx-asr hermes onnx-asr fetch-vad silero
      - run: uv run --package hermes-onnx-asr hermes onnx-asr doctor
      - name: Prove runtime is offline
        shell: bash
        run: |
          export HERMES_ASR_RELEASE_MODEL_DIR="$HERMES_HOME/models/onnx-asr"
          uv run pytest -q -m asr_live integration-tests/test_asr_offline_runtime.py

  asr-corpus:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --all-packages --locked
      - name: Configure and fetch the pinned default pipeline
        run: |
          mkdir -p "$RUNNER_TEMP/hermes-profile"
          printf 'plugins:\n  enabled: [onnx-asr]\nstt:\n  provider: onnx_asr\n  onnx_asr:\n    model: gigaam-v3-e2e-rnnt\n    quantization: int8\n    model_dir: "%s/models/onnx-asr"\n' "$RUNNER_TEMP/hermes-profile" > "$RUNNER_TEMP/hermes-profile/config.yaml"
          echo "HERMES_HOME=$RUNNER_TEMP/hermes-profile" >> "$GITHUB_ENV"
      - name: Require versioned Russian corpus artifact
        run: test -f release-corpus/manifest.jsonl
      - run: test -f release-corpus/baseline.json
      - run: uv run --package hermes-onnx-asr hermes onnx-asr fetch gigaam-v3-e2e-rnnt --quantization int8
      - run: uv run --package hermes-onnx-asr hermes onnx-asr fetch-vad silero
      - run: uv run python tools/asr_corpus_gate.py release-corpus/manifest.jsonl --baseline release-corpus/baseline.json --output release-corpus/result.json
      - name: Preserve corpus metrics
        if: ${{ always() && hashFiles('release-corpus/result.json') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: asr-corpus-result
          path: release-corpus/result.json

  upstream-model-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - {model: gigaam-v2-ctc, quantization: int8}
          - {model: gigaam-v2-rnnt, quantization: int8}
          - {model: gigaam-v3-ctc, quantization: int8}
          - {model: gigaam-v3-rnnt, quantization: int8}
          - {model: gigaam-v3-e2e-ctc, quantization: int8}
          - {model: gigaam-v3-e2e-rnnt, quantization: int8}
          - {model: gigaam-multilingual-ctc, quantization: int8}
          - {model: gigaam-multilingual-large-ctc, quantization: int8}
          - {model: nemo-fastconformer-ru-ctc, quantization: int8}
          - {model: nemo-fastconformer-ru-rnnt, quantization: int8}
          - {model: nemo-parakeet-ctc-0.6b, quantization: int8}
          - {model: nemo-parakeet-rnnt-0.6b, quantization: int8}
          - {model: nemo-parakeet-tdt-0.6b-v2, quantization: int8}
          - {model: nemo-parakeet-tdt-0.6b-v3, quantization: int8}
          - {model: nemo-canary-1b-v2, quantization: int8}
          - {model: alphacep/vosk-model-ru, quantization: int8}
          - {model: alphacep/vosk-model-small-ru, quantization: int8}
          - {model: t-tech/t-one, quantization: fp32}
          - {model: whisper-base, quantization: int8}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --all-packages --locked
      - name: Configure model profile
        run: |
          mkdir -p "$RUNNER_TEMP/hermes-profile"
          config_quantization="${{ matrix.quantization }}"
          if [ "$config_quantization" = fp32 ]; then config_quantization=null; fi
          printf 'plugins:\n  enabled: [onnx-asr]\nstt:\n  provider: onnx_asr\n  onnx_asr:\n    model: ${{ matrix.model }}\n    quantization: %s\n    model_dir: "%s/models/onnx-asr"\n    vad:\n      min_audio_seconds: null\n' "$config_quantization" "$RUNNER_TEMP/hermes-profile" > "$RUNNER_TEMP/hermes-profile/config.yaml"
          echo "HERMES_HOME=$RUNNER_TEMP/hermes-profile" >> "$GITHUB_ENV"
      - run: uv run --package hermes-onnx-asr hermes onnx-asr fetch "${{ matrix.model }}" --quantization "${{ matrix.quantization }}"
      - run: uv run --package hermes-onnx-asr hermes onnx-asr warmup

  vk-live:
    runs-on: ubuntu-latest
    env:
      VK_COMMUNITY_TOKEN: ${{ secrets.VK_COMMUNITY_TOKEN }}
      VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
      VK_TEST_PEER_ID: ${{ secrets.VK_TEST_PEER_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --all-packages --locked
      - name: Require private VK release-test credentials
        shell: bash
        run: test -n "$VK_COMMUNITY_TOKEN" && test -n "$VK_GROUP_ID" && test -n "$VK_TEST_PEER_ID"
      - run: uv run pytest -q -m vk_live
