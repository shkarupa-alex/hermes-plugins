name: Publish to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to rebuild and publish
        required: true
        type: string
      skip_existing:
        description: Skip files already accepted by PyPI (recovery only)
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: pypi-${{ inputs.release_tag || github.ref }}
  cancel-in-progress: false

jobs:
  release-gates:
    uses: ./.github/workflows/release-gates.yml
    with:
      release_tag: ${{ inputs.release_tag || github.ref_name }}
    secrets: inherit

  release-build:
    runs-on: ubuntu-latest
    needs: release-gates

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Verify tag matches every package version
        env:
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: python tools/check_versions.py --tag "$RELEASE_TAG"

      - name: Build release distributions
        run: uv build --all-packages --out-dir dist --clear

      - name: Upload release distributions
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-dists
          path: dist/
          if-no-files-found: error
          retention-days: 7

  pypi-publish:
    runs-on: ubuntu-latest
    needs: release-build
    permissions:
      id-token: write

    environment:
      name: pypi

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
          skip-existing: ${{ inputs.skip_existing || false }}
