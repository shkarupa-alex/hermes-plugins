[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "hermes-onnx-asr"
version = "1.0.2"
description = "CPU-only ONNX ASR transcription provider for Hermes Agent"
readme = "README.md"
requires-python = ">=3.11,<3.14"
license = { text = "MIT" }
authors = [{ name = "Hermes ONNX ASR contributors" }]
dependencies = [
    "filelock>=3.16,<4",
    "hermes-agent>=0.18.2",
    "huggingface-hub>=0.27,<2",
    "onnx-asr[cpu]>=0.12.0",
    "onnxruntime>=1.23.2",
    "packaging>=24,<27",
    "pydantic>=2.10.0,<3",
    "pydantic-settings>=2.7.0,<3",
]

[project.entry-points."hermes_agent.plugins"]
"onnx-asr" = "hermes_onnx_asr"

[tool.hatch.build.targets.wheel]
packages = ["src/hermes_onnx_asr"]

[tool.hatch.build.targets.wheel.force-include]
"plugin.yaml" = "hermes_onnx_asr/plugin.yaml"
