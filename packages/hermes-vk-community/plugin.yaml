name: vk-community
manifest_version: 1
label: VK Community
kind: platform
version: 1.0.8
description: VK Community Long Poll gateway adapter for Hermes Agent.
author: Hermes VK Community contributors
requires_env:
  - name: VK_COMMUNITY_TOKEN
    description: VK community access token with messages, management, photos, and documents permissions
    prompt: VK Community token
    url: https://dev.vk.com/ru/api/bots/getting-started
    password: true
    category: credential
