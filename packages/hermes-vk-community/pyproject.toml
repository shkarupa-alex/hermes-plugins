[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "hermes-vk-community"
version = "1.0.1"
description = "VK Community Long Poll platform plugin for Hermes Agent"
readme = "README.md"
requires-python = ">=3.11,<3.14"
license = { text = "MIT" }
authors = [{ name = "Hermes VK Community contributors" }]
dependencies = [
    "aiohttp>=3.14.1",
    "aiosqlite==0.22.1",
    "filetype==1.2.0",
    "hermes-agent>=0.18.2",
    "markdown-it-py>=4.0.0,<5",
    "packaging>=24,<27",
    "pillow==12.2.0",
    "pydantic>=2.10.0,<3",
    "pydantic-settings>=2.7.0,<3",
    "tenacity==9.1.4",
]

[project.entry-points."hermes_agent.plugins"]
"vk-community" = "hermes_vk_community"

[tool.hatch.build.targets.wheel]
packages = ["src/hermes_vk_community"]

[tool.hatch.build.targets.wheel.force-include]
"plugin.yaml" = "hermes_vk_community/plugin.yaml"
